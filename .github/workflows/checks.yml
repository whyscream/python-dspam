# SPDX-License-Identifier: BSD-3-Clause

name: Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Check code style
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6.2.0
      with:
        python-version-file: "pyproject.toml"
    - uses: pre-commit/action@v3.0.1

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6.2.0
      with:
        python-version-file: "pyproject.toml"
    - uses: astral-sh/setup-uv@v8.2.0
      with:
        activate-environment: true
    - run: uv sync --all-packages --frozen --group test
    - run: uv run pytest -v --cov --cov-report=xml:coverage.xml --junitxml=pytest.xml
    - run: mypy --config-file=pyproject.toml --junit-xml mypy.xml .
    - uses: actions/upload-artifact@v7.0.1
      with:
        path: |
          coverage.xml
          pytest.xml
          mypy.xml
        name: test-reports

  sonarqube:
    name: Static code analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6.2.0
      with:
        python-version-file: "pyproject.toml"
    - uses: actions/download-artifact@v8.0.1
      with:
        name: test-reports
    - name: Extract package version
      run: |
        pip install --upgrade setuptools-git-versioning
        echo "PACKAGE_VERSION=$(setuptools-git-versioning)" >> $GITHUB_ENV
    - name: Show package version
      run: |
        echo "Extracted package version: ${{ env.PACKAGE_VERSION }}"
    - uses: SonarSource/sonarqube-scan-action@v8.2.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          --define "sonar.projectVersion=${{ env.PACKAGE_VERSION }}"
          --define "sonar.python.coverage.reportPaths=coverage.xml"
          --define "sonar.junit.reportPaths=pytest.xml"
          --define "sonar.python.mypy.reportPaths=mypy.xml"
    - uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
